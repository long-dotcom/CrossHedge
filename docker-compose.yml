services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crosshedge
      POSTGRES_USER: crosshedge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crosshedge_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crosshedge -d crosshedge"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      # Windows 主机上的 MT5 Gateway 通过本端口连接。
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: ${CROSSHEDGE_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+psycopg2://crosshedge:${POSTGRES_PASSWORD:-crosshedge_local}@postgres:5432/crosshedge
      REDIS_URL: redis://redis:6379/0
      SYMBOL_MAPPING_PATH: /app/config/symbol_mappings.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10

  execution-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    entrypoint: []
    command: ["python", "-m", "app.execution.worker_main"]
    env_file: ${CROSSHEDGE_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+psycopg2://crosshedge:${POSTGRES_PASSWORD:-crosshedge_local}@postgres:5432/crosshedge
      REDIS_URL: redis://redis:6379/0
      SYMBOL_MAPPING_PATH: /app/config/symbol_mappings.yaml
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
